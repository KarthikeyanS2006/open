name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup temporary workspace
          mkdir temp_sync
          cp app.py elite_bridge.py requirements.txt temp_sync/ || true
          cd temp_sync
          
          # 2. Initialize a BRAND NEW git repo (No history, no LFS)
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 3. Add only the necessary code files
          git add app.py elite_bridge.py requirements.txt
          git commit -m "Clean deployment to Hugging Face"
          
          # 4. Force push this 'clean' version to HF
          # This replaces the HF history with a history that has NO LFS files
          git push --force https://KarthikeyanS2006:$HF_TOKEN@huggingface.co/spaces/KarthikeyanS2006/OpenMythos-Guardian main
