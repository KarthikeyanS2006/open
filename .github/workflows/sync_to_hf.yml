name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Setup temporary workspace
          mkdir temp_sync
          cp app.py elite_bridge.py requirements.txt temp_sync/ || true
          cd temp_sync
          
          # 2. Initialize a BRAND NEW git repo
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 3. Rename branch to 'main' (THIS FIXES THE ERROR)
          git branch -M main
          
          # 4. Add only the code files
          git add app.py elite_bridge.py requirements.txt
          git commit -m "Final Clean Deployment"
          
          # 5. Force push to HF
          git push --force https://KarthikeyanS2006:$HF_TOKEN@huggingface.co/spaces/KarthikeyanS2006/OpenMythos-Guardian main
