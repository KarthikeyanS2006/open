name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Completely disable LFS for this push session
          git config --global lfs.allowincompletepush true
          git lfs uninstall
          
          # 2. Force delete the file from the local sync environment
          git rm --cached mythos_junior_hacker.pth || true
          
          # 3. Configure Git Identity
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 4. Commit the change locally (it won't affect your main GitHub repo)
          git commit -m "Cleanup for HF Sync" || true
          
          # 5. Push using standard Git, bypassing the LFS check
          git push --force https://KarthikeyanS2006:$HF_TOKEN@huggingface.co/spaces/KarthikeyanS2006/OpenMythos-Guardian main
