name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Remove the LFS tracking for this push so HF doesn't reject it
          git rm --cached mythos_junior_hacker.pth || true
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -m "Internal: Stripping LFS pointers for HF Sync" || true
          
          # Force push to Hugging Face
          git push --force https://KarthikeyanS2006:$HF_TOKEN@huggingface.co/spaces/KarthikeyanS2006/OpenMythos-Guardian main
